<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شهادة إتمام الدورة </title>
    <link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="my-certificate-body">

<div class="my-certificate">
    <div class="my-certificate-logo">
        <img src="../images/logo.jpeg" alt="شعار أكاديمية المطبخ">
    </div>

    <h1 class="my-certificate-academy"> أكاديمية رشه</h1>
	<h1 class="my-certificate-academy">شهادة إتمام دورة</h1>
    
    <p class="my-certificate-text">تشهد أكاديمية رشه بأن متدريبنا</p>

    <h3 class="my-student-name">[اسم الطالب]</h3>

    <p class="my-certificate-text">
        قد أتم بنجاح الدورة <br>
        وذلك بعد اجتيازه جميع المتطلبات والاختبارات المقررة<br>
        بمعدل <strong class="my-course-grade">5/5</strong>
    </p>

  

    <div class="my-certificate-footer">
        <div class="my-certificate-date">
            <p>التاريخ:أبريل- 2026</p>
        </div>
        <div class="my-certificate-signature">
            <p>فريق رشه</p>

        </div>
    </div>

    <div class="my-certificate-print">
        <a href="#" onclick="window.print(); return false;" class="my-print-btn">
            <i class="fas fa-print"></i> طباعة الشهادة
        </a>
    </div>
</div>


</body>
</html>
