<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>شهادة إتمام الدورة | رشة</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* إعادة تعيين خلفية الصفحة للشهادة */
        body.my-certificate-body {
            background: #f0f2f5;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .my-certificate {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #ddd;
            transition: all 0.3s ease;
        }
        .my-certificate-logo img {
            width: 100px;
            margin-bottom: 20px;
        }
        .my-certificate-academy {
            font-size: 28px;
            color: #4f6357;
            margin-bottom: 10px;
        }
        .my-certificate-title {
            font-size: 32px;
            color: #8ea79a;
            border-bottom: 2px solid #4f6357;
            display: inline-block;
            padding-bottom: 8px;
            margin-bottom: 30px;
        }
        .my-certificate-text {
            font-size: 20px;
            color: #333;
            margin: 15px 0;
        }
        .my-student-name {
            font-size: 32px;
            color: #4f6357;
            margin: 20px 0;
            font-weight: bold;
            border-bottom: 1px dashed #4f6357;
            display: inline-block;
            padding-bottom: 8px;
        }
        .my-course-grade {
            font-size: 20px;
            color: #e67e22;
        }
        .my-certificate-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 40px;
            margin-bottom: 20px;
        }
        .my-certificate-signature,
        .my-certificate-date {
            text-align: center;
            width: 100%;
            font-size: 18px;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        .my-print-btn {
            background: #4f6357;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
            font-size: 18px;
            transition: 0.3s;
            margin-top: 20px;
        }
        .my-print-btn:hover {
            background: #3d4f44;
            transform: translateY(-2px);
        }

        /* تحسينات الجوال */
        @media (max-width: 768px) {
            body.my-certificate-body {
                padding: 10px;
            }
            .my-certificate {
                padding: 20px 15px;
            }
            .my-certificate-logo img {
                width: 70px;
            }
            .my-certificate-academy {
                font-size: 22px;
            }
            .my-certificate-title {
                font-size: 24px;
            }
            .my-certificate-text {
                font-size: 16px;
            }
            .my-student-name {
                font-size: 24px;
            }
            .my-course-grade {
                font-size: 16px;
            }
            .my-certificate-signature,
            .my-certificate-date {
                font-size: 14px;
            }
            .my-print-btn {
                font-size: 16px;
                padding: 10px 20px;
            }
        }

        @media (max-width: 480px) {
            .my-certificate {
                padding: 15px 10px;
            }
            .my-certificate-academy {
                font-size: 18px;
            }
            .my-certificate-title {
                font-size: 20px;
            }
            .my-certificate-text {
                font-size: 14px;
            }
            .my-student-name {
                font-size: 20px;
            }
        }

        /* تحسين الطباعة */
        @media print {
            body.my-certificate-body {
                background: white;
                padding: 0;
                margin: 0;
            }
            .my-certificate {
                box-shadow: none;
                border: none;
                padding: 20px;
            }
            .my-print-btn {
                display: none;
            }
        }
    </style>
</head>
<body class="my-certificate-body">

<div class="my-certificate">
    <div class="my-certificate-logo">
        <img src="../images/logo.jpeg" alt="شعار أكاديمية المطبخ">
    </div>

    <h1 class="my-certificate-academy">أكاديمية رشه</h1>
    <h1 class="my-certificate-title">شهادة إتمام دورة</h1>
    
    <p class="my-certificate-text">تشهد أكاديمية رشه بأن متدريبنا</p>

    <h3 class="my-student-name" id="studentNameDisplay">[اسم الطالب]</h3>

    <p class="my-certificate-text">
        قد أتم بنجاح الدورة <br>
        وذلك بعد اجتيازه جميع المتطلبات والاختبارات المقررة<br>
        <strong class="my-course-grade" id="courseGradeDisplay"></strong>
    </p>

    <div class="my-certificate-footer">
        <div class="my-certificate-signature">
            <p>فريق رشه</p>
        </div>
        <div class="my-certificate-date">
            <p id="certificateDate">التاريخ: -- / -- / ----</p>
        </div>
    </div>

    <div class="my-certificate-print">
        <a href="#" onclick="window.print(); return false;" class="my-print-btn">
            <i class="fas fa-print"></i> طباعة الشهادة
        </a>
    </div>
</div>

<script>
    // قراءة الاسم من localStorage
    let studentName = localStorage.getItem("studentName");
    const nameSpan = document.getElementById("studentNameDisplay");
    if (studentName && studentName.trim() !== "") {
        nameSpan.textContent = studentName;
    } else {
        let newName = prompt("لم يتم العثور على اسم. أدخل اسمك:", "");
        if (newName && newName.trim() !== "") {
            localStorage.setItem("studentName", newName);
            nameSpan.textContent = newName;
        } else {
            nameSpan.textContent = "الطالب/ة";
        }
    }

    // عرض اسم الدورة ونتيجة الاختبار (من sessionStorage)
    let courseName = sessionStorage.getItem("courseName") || "الدورة";
    let currentScore = sessionStorage.getItem("currentQuizScore") || "0";
    let totalQuestions = sessionStorage.getItem("quizTotalQuestions") || "1";
    let gradeDisplay = document.getElementById("courseGradeDisplay");
    if (gradeDisplay) {
        gradeDisplay.textContent = `الدورة: ${courseName} - النتيجة: ${currentScore}/${totalQuestions}`;
    }

    // التاريخ الحالي
    const today = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric' };
    const formattedDate = today.toLocaleDateString('ar-SA', options);
    document.getElementById("certificateDate").innerHTML = `التاريخ: ${formattedDate}`;
</script>

</body>
</html>
